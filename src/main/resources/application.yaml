server:
  port: 8080

app:
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  jwt:
    secret: ${APP_JWT_SECRET:}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:300000}
    refresh-expiration-ms: ${APP_JWT_REFRESH_EXPIRATION_MS:604800000}

spring:
  application:
    name: AI-HUB-STUDY

  autoconfigure:
    exclude:
      - org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatConnectionAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration

  jackson:
    datatype:
      datetime:
        write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  ai:
    model:
      chat: none
      embedding:
        text: none

  datasource:
    url: ${SQLSERVER_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=lms_ai;encrypt=true;trustServerCertificate=true}
    username: ${SQLSERVER_DATASOURCE_USERNAME:sa}
    password: ${SQLSERVER_DATASOURCE_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
            scope:
              - email
              - profile

aws:
  region: ${AWS_REGION:}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:}
    key-prefix: ${AWS_S3_KEY_PREFIX:}
    endpoint: ${AWS_S3_ENDPOINT:}
    presigned-url-expiration-minutes: ${AWS_S3_PRESIGNED_URL_EXPIRATION_MINUTES:10}

ocr:
  tesseract:
    enabled: ${TESSERACT_ENABLED:false}
    executable-path: ${TESSERACT_EXECUTABLE_PATH:}
    tessdata-path: ${TESSERACT_TESSDATA_PATH:}
    language: ${TESSERACT_LANGUAGE:eng}
    timeout-seconds: ${TESSERACT_TIMEOUT_SECONDS:60}
    pdf-dpi: ${TESSERACT_PDF_DPI:200}
    pdf-text-min-characters: ${TESSERACT_PDF_TEXT_MIN_CHARACTERS:20}